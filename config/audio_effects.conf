# PF-ENGINE PRO MAX — audio_effects.conf overlay
# Coloca en /vendor/etc/ o parchea via Magisk overlay

libraries {
  pfengine {
    path /system/lib64/libpfengine.so
  }
}

effects {
  pf_dsp {
    library pfengine
    uuid 12345678-1234-1234-1234-123456789abc
  }
}

output_session_processing {
  music {
    pf_dsp {
      target_uuid 12345678-1234-1234-1234-123456789abc
    }
  }
  ring {}
  alarm {}
}
