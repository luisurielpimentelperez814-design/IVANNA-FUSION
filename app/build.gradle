plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.ivannafusion'
    compileSdk 34
    aaptOptions {
        noCompress "tflite"
    }
    defaultConfig {
        applicationId "com.ivannafusion"
        minSdk 29
        targetSdk 34
        versionCode 100
        versionName "1.0.0-TRASCENDENTAL"
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared", "-DCMAKE_BUILD_TYPE=Release"
            }
        }
    flavorDimensions = ["distribution"]
    productFlavors {
        // Para público en general: APK con binarios nativos para las 4
        // ABIs principales (arm64-v8a, armeabi-v7a, x86_64, x86), sin
        // depender de root/Magisk. Flags de compilación nativa genéricas
        // (sin -march específico de ARM, que rompería x86/x86_64).
        universal {
            dimension "distribution"
            ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
            externalNativeBuild {
                cmake {
                    cppFlags "-O3 -ffast-math -funroll-loops -fPIC"
                }
            buildConfigField "boolean", "MAGISK_INTEGRATION", "false"
        // Para distribución Enterprise/avanzada: solo arm64-v8a (única
        // ABI realista en dispositivos con Magisk/root modernos), con
        // las flags de optimización ARM específicas (NEON dotprod) y
        // habilitando la integración con el módulo Magisk
        // (DSPController/MagiskBridge ya presentes en el código Kotlin,
        // ver app/src/main/java/com/ivannafusion/DSPController.kt y
        // MagiskBridge.kt).
        enterprise {
                abiFilters 'arm64-v8a'
                    cppFlags "-O3 -ffast-math -funroll-loops -march=armv8.2-a+fp16+dotprod -fPIC"
            buildConfigField "boolean", "MAGISK_INTEGRATION", "true"
    signingConfigs {
        debug {
            storeFile file("${rootDir}/debug.keystore // solo para debug")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
            debuggable true
    externalNativeBuild {
        cmake {
            path "src/CMakeLists.txt"
            version "3.22.1"
    buildFeatures {
        compose true
        buildConfig true
    composeOptions {
        kotlinCompilerExtensionVersion '1.5.8'
    kotlinOptions {
        jvmTarget = '1.8'
    packagingOptions {
        pickFirst '**/libjsc.so'
        pickFirst '**/libc++_shared.so'
dependencies {
    implementation "androidx.work:work-runtime-ktx:2.9.0"
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation platform('androidx.compose:compose-bom:2024.02.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.navigation:navigation-compose:2.7.7'
    implementation 'androidx.datastore:datastore-preferences:1.0.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    implementation 'androidx.glance:glance:1.0.0'
    implementation 'com.alphacephei:vosk-android:0.3.47'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'com.jakewharton.timber:timber:5.0.1'
    implementation 'org.tensorflow:tensorflow-lite:2.14.0'
    debugImplementation 'androidx.compose.ui:ui-tooling'
