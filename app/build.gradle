plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.ivannafusion'
    compileSdk 34

    // Requerido para que YamnetClassifier pueda mapear yamnet.tflite con
    // FileChannel.map() en runtime — un .tflite comprimido en el APK
    // falla al cargar con Interpreter().
    aaptOptions {
        noCompress "tflite"
    }

    defaultConfig {
        applicationId "com.ivannafusion"
        minSdk 29
        targetSdk 34
        versionCode 100
        versionName "1.0.0-TRASCENDENTAL"

        externalNativeBuild {
            cmake {
                cppFlags "-O3 -ffast-math -funroll-loops -march=armv8.2-a+fp16+dotprod -fPIC -std=c++20"
                arguments "-DANDROID_STL=c++_shared", "-DCMAKE_BUILD_TYPE=Release"
            }
        }
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    signingConfigs {
        debug {
            storeFile file("../debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        debug {
            minifyEnabled false
            debuggable true
            signingConfig signingConfigs.debug
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.5.8'
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    packagingOptions {
        pickFirst '**/libjsc.so'
        pickFirst '**/libc++_shared.so'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation platform('androidx.compose:compose-bom:2024.02.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.navigation:navigation-compose:2.7.7'
    implementation 'androidx.datastore:datastore-preferences:1.0.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.glance:glance:1.0.0'
    implementation 'com.alphacephei:vosk-android:0.3.47'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'com.jakewharton.timber:timber:5.0.1'
    // YAMNet (clasificación de audio música/voz/silencio, 521 clases
    // AudioSet) — runtime real, sin placeholder. Se usa solo el runtime
    // base tensorflow-lite (no tensorflow-lite-task-audio): esa capa de
    // alto nivel tiene un problema conocido de incompatibilidad con
    // alineación de páginas de 16KB en Android recientes, y TensorFlow
    // mismo recomienda migrar a LiteRT/MediaPipe en su lugar, con
    // soporte incierto a futuro. El preprocesamiento de audio que YAMNet
    // necesita (16kHz mono, framing) se implementa directamente en
    // YamnetClassifier.kt en vez de depender de esa capa.
    implementation 'org.tensorflow:tensorflow-lite:2.14.0'
    debugImplementation 'androidx.compose.ui:ui-tooling'
}
