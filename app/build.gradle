plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.ivannafusion'
    compileSdk 34

    defaultConfig {
        applicationId "com.ivannafusion"
        minSdk 29
        targetSdk 34
        versionCode 100
        versionName "1.0.0-TRASCENDENTAL"

        externalNativeBuild {
            cmake {
                // Flags de optimización ARM64.
                // Se eliminó -fopenmp / -static-openmp: ninguna TU usa
                // #pragma omp y sin find_package(OpenMP) en CMakeLists.txt
                // el linker podía no encontrar libomp.a en NDK r27c.
                cppFlags "-O3 -ffast-math -funroll-loops -march=armv8.2-a+fp16+dotprod -fPIC"
                arguments "-DANDROID_STL=c++_shared", "-DCMAKE_BUILD_TYPE=Release"
            }
        }
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.create("release") {
                def ksPassword = System.getenv("IVANNA_KEYSTORE_PASSWORD")
                def signKeyPassword = System.getenv("IVANNA_KEY_PASSWORD")
                if (ksPassword == null || signKeyPassword == null) {
                    throw new GradleException(
                        "IVANNA_KEYSTORE_PASSWORD / IVANNA_KEY_PASSWORD no definidas")
                }
                storeFile file("../ivanna-keystore.jks")
                storePassword ksPassword
                keyAlias "ivanna"
                keyPassword signKeyPassword
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.5.8'
    }

    kotlinOptions {
        jvmTarget = '1.8'
        freeCompilerArgs += [
            "-opt-in=androidx.compose.material3.ExperimentalMaterial3Api",
            "-opt-in=androidx.compose.material.ExperimentalMaterialApi",
            "-opt-in=androidx.compose.foundation.ExperimentalFoundationApi",
            "-opt-in=androidx.compose.animation.ExperimentalAnimationApi",
            "-opt-in=androidx.compose.ui.ExperimentalComposeUiApi"
        ]
    }

    packagingOptions {
        pickFirst '**/libjsc.so'
        pickFirst '**/libc++_shared.so'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation platform('androidx.compose:compose-bom:2024.02.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.navigation:navigation-compose:2.7.7'
    implementation 'androidx.glance:glance:1.0.0'
    // vosk-android: el groupId publicado es com.alphacephei.
    // Si el reconocimiento de voz no está implementado, se puede remover.
    implementation 'com.alphacephei:vosk-android:0.3.47'
    implementation 'androidx.documentfile:documentfile:1.0.1'
}
