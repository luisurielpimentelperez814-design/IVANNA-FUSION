nombre: IVANNA-FUSION CI a nivel de Google

en:
  empujar:
    ramas: [principal, desarrollo]
  solicitud_de_extracción:

concurrencia:
  grupo: ivanna-${{ github.ref }}
  cancelar-en-proceso: verdadero

empleos:

  # ───────────────────────────
  # 1. BOTAS (ENTORNO LIMPIO)
  # ───────────────────────────
  bootstrap:
    se ejecuta en: ubuntu-latest

    pasos:
      - usos: actions/checkout@v4

      - nombre: Entorno de limpieza difícil
        correr: |
          rm -rf ~/.gradle
          rm -rf ~/.android
          rm -rf $HOME/.m2

      - nombre: Configurar Java 17 (ABI estable para AGP 8+)
        usos: actions/setup-java@v4
        con:
          distribución: temurin
          versión de java: 17

      - nombre: Configurar el SDK de Android (aislado)
        usos: android-actions/setup-android@v3
        con:
          aceptar-licencias-sdk-android: true

      - nombre: Instalar la cadena de herramientas exacta (FIJADO)
        correr: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - nombre: Validar AAPT2
        correr: |
          file $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2
          $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2 --version

  # ───────────────────────────
  # 2. COMPILACIÓN NATIVA DE DSP (C++)
  # ───────────────────────────
  dsp-nativo:
    se ejecuta en: ubuntu-latest
    necesidades: bootstrap

    pasos:
      - usos: actions/checkout@v4

      - nombre: Configurar SDK de Android y NDK
        usos: android-actions/setup-android@v3

      - nombre: Compilación DSP (limpieza multi-ABI)
        correr: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

  # ───────────────────────────
  # 3. COMPILACIÓN DE ANDROID (GRADLE AISLADO)
  # ───────────────────────────
  compilacion-android:
    se ejecuta en: ubuntu-latest
    necesidades: dsp-nativo

    pasos:
      - usos: actions/checkout@v4

      - nombre: Configurar Java 17
        usos: actions/setup-java@v4
        con:
          distribución: temurin
          versión de java: 17

      - nombre: Configurar SDK de Android
        usos: android-actions/setup-android@v3

      - nombre: Reinstalar el SDK exacto (determinista)
        correr: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0"

      - nombre: Corregir el aislamiento de Gradle
        correr: |
          rm -rf ~/.gradle/caches
          chmod +x gradlew

      - nombre: Crear APK (empresarial)
        correr: |
          ./gradlew clean
          ./gradlew assembleEnterpriseDebug --no-daemon --stacktrace

  # ───────────────────────────
  # 4. CAPA DE EMBALAJE DE MAGISK
  # ───────────────────────────
  magisk:
    se ejecuta en: ubuntu-latest
    necesidades: compilacion-android

    pasos:
      - usos: actions/checkout@v4

      - nombre: Módulo del paquete
        correr: |
          cd magisk_module
          zip -r ../ivanna-magisk.zip .

  # ───────────────────────────
  # 5. EXPORTACIÓN DE ARTEFACTOS (INMUTABLE)
  # ───────────────────────────
  publicar:
    se ejecuta en: ubuntu-latest
    necesidades: magisk

    pasos:
      - usos: actions/upload-artifact@v4
        con:
          nombre: ivanna-fusion-release
          ruta: |
            app/build/outputs/apk/**/enterprise/debug/*.apk
            ivanna-magisk.zip
            
