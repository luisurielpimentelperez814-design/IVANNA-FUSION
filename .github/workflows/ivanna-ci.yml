name: IVANNA-FUSION Industrial CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

concurrency:
  group: ivanna-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.1.8937393" \
                     "cmake;3.22.1"

      - name: Fix environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK (Enterprise)
        run: ./gradlew assembleEnterpriseDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-enterprise-apk
          path: app/build/outputs/apk/enterprise/debug/*.apk


  build-magisk:
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - uses: actions/checkout@v4

      - uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Build native DSP
        run: |
          mkdir -p build_native
          cd build_native
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_SDK_ROOT/ndk/25.1.8937393/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29
          cmake --build . --parallel

      - name: Package Magisk module
        run: |
          cd magisk_module
          zip -r ../ivanna-magisk.zip .

      - name: Upload Magisk module
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-magisk
          path: ivanna-magisk.zip
