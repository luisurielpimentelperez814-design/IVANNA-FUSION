name: IVANNA-FUSION Industrial CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ivanna-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTA: static-analysis y build-dsp-multiabi validan el CMakeLists.txt
  # de la RAÍZ del repo (core/, include/ivanna/), que está documentado
  # en README.md como código NO conectado al APK real (ver sección
  # '⚠️ BASE ACTIVA DEL PROYECTO'). Se mantienen como jobs informativos
  # (continue-on-error) en vez de bloquear build-android-apk, que es el
  # único job que produce el artefacto real que se instala en el
  # dispositivo. Antes, build-android-apk tenía 'needs: [static-analysis,
  # build-dsp-multiabi]' — si cualquiera de esos dos fallaba (por ejemplo,
  # por el biquad sin SIMD real de core/dsp/biquad_neon.h, o por
  # cppcheck sobre código experimental), el job del APK real ni siquiera
  # se ejecutaba, aunque la app en sí compilara perfectamente.
  static-analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck
      
      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: cppcheck
        run: |
          cppcheck --error-exitcode=1 --enable=warning,performance \
            --suppress=missingInclude --inline-suppr \
            core/ include/ 2>&1 | tee cppcheck.log || true

  build-dsp-multiabi:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: true
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
      
      - name: Build DSP core (${{ matrix.arch }})
        run: |
          cmake -B build-${{ matrix.arch }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }} --parallel

  # Único job que produce el artefacto real instalable. Ya no depende de
  # los dos jobs informativos de arriba — solo necesita que app/src/main/
  # cpp/CMakeLists.txt (la base activa real) y el resto de Gradle estén
  # correctos. debug.keystore se versiona en la raíz del repo (es un
  # keystore de DEBUG estándar, sin secretos de producción — alias
  # androiddebugkey, password 'android', igual al que Android Studio
  # genera automáticamente; antes faltaba en el repo y rompía el
  # signingConfig en cualquier entorno de CI limpio).
  build-android-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

  zero-failure-gate:
    runs-on: ubuntu-latest
    needs: [build-android-apk]
    steps:
      - run: echo "✅ APK real (única base activa) compiló correctamente."
