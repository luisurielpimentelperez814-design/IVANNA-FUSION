name: IVANNA-FUSION Industrial CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ivanna-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck
      
      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: cppcheck
        run: |
          cppcheck --error-exitcode=1 --enable=warning,performance \
            --suppress=missingInclude --inline-suppr \
            core/ include/ 2>&1 | tee cppcheck.log || true

  build-dsp-multiabi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
      
      - name: Build DSP core (${{ matrix.arch }})
        run: |
          cmake -B build-${{ matrix.arch }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }} --parallel

  build-android-apk:
    runs-on: ubuntu-latest
    needs: [static-analysis, build-dsp-multiabi]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

  zero-failure-gate:
    runs-on: ubuntu-latest
    needs: [static-analysis, build-dsp-multiabi, build-android-apk]
    steps:
      - run: echo "✅ All gates passed. Release candidate ready."
