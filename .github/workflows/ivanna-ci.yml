name: IVANNA-FUSION Google-Level CI

on:
  push:
    branches: [main, development]
  pull_request:

concurrency:
  group: ivanna-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ─────────────────────────────
# 1. BOOTSTRAP (ENTORNO LIMPIO)
# ─────────────────────────────
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Hard clean environment
        run: |
          rm -rf ~/.gradle
          rm -rf ~/.android
          rm -rf $HOME/.m2

      - name: Setup Java 17 (stable ABI for AGP 8+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK (isolated)
        uses: android-actions/setup-android@v3

      - name: Install exact toolchain (PINNED)
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: Validate AAPT2
        run: |
          file $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2
          $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2 --version


# ─────────────────────────────
# 2. NATIVE DSP BUILD (C++)
# ─────────────────────────────
  dsp-native:
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        run: sdkmanager "ndk;25.1.8937393"

      - name: Build DSP (multi-ABI clean)
        run: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.1.8937393

          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build build --parallel


# ─────────────────────────────
# 3. ANDROID BUILD (GRADLE ISOLATED)
# ─────────────────────────────
  android-build:
    runs-on: ubuntu-latest
    needs: dsp-native

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Reinstall exact SDK (deterministic)
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0"

      - name: Fix Gradle isolation
        run: |
          rm -rf ~/.gradle/caches
          chmod +x gradlew

      - name: Build APK (enterprise)
        run: |
          ./gradlew clean
          ./gradlew assembleEnterpriseDebug --no-daemon --stacktrace


# ─────────────────────────────
# 4. MAGISK PACKAGING LAYER
# ─────────────────────────────
  magisk:
    runs-on: ubuntu-latest
    needs: android-build

    steps:
      - uses: actions/checkout@v4

      - name: Package module
        run: |
          cd magisk_module
          zip -r ../ivanna-magisk.zip .


# ─────────────────────────────
# 5. ARTIFACT EXPORT (IMMUTABLE)
# ─────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: magisk

    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: ivanna-fusion-release
          path: |
            app/build/outputs/apk/**/enterprise/debug/*.apk
            ivanna-magisk.zip
