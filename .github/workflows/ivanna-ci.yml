name: IVANNA-FUSION Google-Level CI

on:
  push:
    branches: [main, development]
  pull_request:

concurrency:
  group: ivanna-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — APK (Gradle + NDK, self-contained, sube artifact en este mismo job)
# ─────────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          SDKMGR=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMGR \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1" 2>/dev/null || true

      - name: Verify toolchain
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2 version
          echo "NDK: $ANDROID_SDK_ROOT/ndk/25.1.8937393"
          ls $ANDROID_SDK_ROOT/ndk/25.1.8937393/build/cmake/android.toolchain.cmake

      - name: Create debug keystore
        run: |
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          keytool -genkeypair -v -noprompt \
            -keystore "${GITHUB_WORKSPACE}/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Android,O=Android,L=Unknown,ST=Unknown,C=US"
          ls -lh "${GITHUB_WORKSPACE}/debug.keystore"

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches
          chmod +x gradlew

      - name: Build APK (enterprise debug)
        run: ./gradlew assembleEnterpriseDebug --no-daemon --stacktrace

      - name: Build APK (universal debug)
        run: ./gradlew assembleUniversalDebug --no-daemon --stacktrace

      - name: List APKs generated
        run: find app/build/outputs/apk -name "*.apk" | sort

      # ── UPLOAD aquí mismo, en la VM que tiene los archivos ──────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-fusion-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload native .so libs
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-native-libs
          path: app/build/intermediates/cxx/**/*.so
          if-no-files-found: warn
          retention-days: 14


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Magisk module (self-contained, sube artifact en este mismo job)
# ─────────────────────────────────────────────────────────────────────────────
  build-magisk:
    name: Build Magisk Module
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package Magisk module
        run: |
          cd magisk_module
          zip -r ../ivanna-magisk-module.zip . \
            --exclude "*.git*" \
            --exclude "*.DS_Store"
          echo "Module size: $(du -sh ../ivanna-magisk-module.zip)"

      # ── UPLOAD aquí mismo ────────────────────────────────────────────────
      - name: Upload Magisk module
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-magisk-module
          path: ivanna-magisk-module.zip
          if-no-files-found: error
          retention-days: 14


# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Release bundle (descarga los artifacts anteriores y los combina)
#          Solo corre si los dos jobs anteriores tuvieron éxito
# ─────────────────────────────────────────────────────────────────────────────
  bundle-release:
    name: Bundle Release
    runs-on: ubuntu-latest
    needs: [build-apk, build-magisk]

    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: ivanna-fusion-apks
          path: release/apk

      - name: Download Magisk module
        uses: actions/download-artifact@v4
        with:
          name: ivanna-magisk-module
          path: release/magisk

      - name: Inventory release bundle
        run: |
          echo "=== APKs ==="
          find release/apk -name "*.apk" -exec ls -lh {} \;
          echo "=== Magisk ==="
          ls -lh release/magisk/

      - name: Upload complete release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-fusion-RELEASE-${{ github.sha }}
          path: release/
          if-no-files-found: error
          retention-days: 30
