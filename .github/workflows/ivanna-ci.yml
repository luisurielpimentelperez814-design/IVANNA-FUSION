name: IVANNA-FUSION Industrial CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ivanna-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTA: static-analysis y build-dsp-multiabi validan el CMakeLists.txt
  # de la RAÍZ del repo (core/, include/ivanna/), que está documentado
  # en README.md como código NO conectado al APK real (ver sección
  # '⚠️ BASE ACTIVA DEL PROYECTO'). Se mantienen como jobs informativos
  # (continue-on-error) en vez de bloquear build-android-apk, que es el
  # único job que produce el artefacto real que se instala en el
  # dispositivo. Antes, build-android-apk tenía 'needs: [static-analysis,
  # build-dsp-multiabi]' — si cualquiera de esos dos fallaba (por ejemplo,
  # por el biquad sin SIMD real de core/dsp/biquad_neon.h, o por
  # cppcheck sobre código experimental), el job del APK real ni siquiera
  # se ejecutaba, aunque la app en sí compilara perfectamente.
  static-analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck
      
      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: cppcheck
        run: |
          cppcheck --error-exitcode=1 --enable=warning,performance \
            --suppress=missingInclude --inline-suppr \
            core/ include/ 2>&1 | tee cppcheck.log || true

  build-dsp-multiabi:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: true
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
      
      - name: Build DSP core (${{ matrix.arch }})
        run: |
          cmake -B build-${{ matrix.arch }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }} --parallel

  # Único job que produce el artefacto real instalable. Ya no depende de
  # los dos jobs informativos de arriba — solo necesita que app/src/main/
  # cpp/CMakeLists.txt (la base activa real) y el resto de Gradle estén
  # correctos. debug.keystore se versiona en la raíz del repo (es un
  # keystore de DEBUG estándar, sin secretos de producción — alias
  # androiddebugkey, password 'android', igual al que Android Studio
  # genera automáticamente; antes faltaba en el repo y rompía el
  # signingConfig en cualquier entorno de CI limpio).
  build-android-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # Variante 'enterprise': solo arm64-v8a (única ABI realista en
      # dispositivos con Magisk/root modernos), con MAGISK_INTEGRATION=true
      # (ver app/build.gradle productFlavors) — esta es la variante que
      # se distribuye junto al módulo Magisk de abajo.
      - name: Build APK (enterprise, arm64-v8a + integración Magisk)
        run: ./gradlew assembleEnterpriseDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-fusion-enterprise-apk
          path: app/build/outputs/apk/enterprise/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Set up Android NDK (para compilar el módulo Magisk)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      # libomega_effect.so (Audio Effect HAL real, target ya definido en
      # app/src/main/cpp/CMakeLists.txt) se compila aquí para empaquetar
      # junto al módulo, ya que audio_effects.xml lo referencia y antes
      # nunca se generaba ni se copiaba (ver fix(crítico) previo en el
      # historial de este repo).
      - name: Build libomega_effect.so (Audio Effect HAL)
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p app/src/main/cpp/build_effect_only
          cd app/src/main/cpp/build_effect_only
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DANDROID_STL=c++_shared
          cmake --build . --target omega_effect --config Release

      - name: Build omega_daemon (binario root del módulo)
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p magisk_module/daemon_src/build
          cd magisk_module/daemon_src/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_shared
          cmake --build . --config Release
          cp omega_daemon ../../system/bin/omega_daemon
          chmod 755 ../../system/bin/omega_daemon

      - name: Empaquetar módulo Magisk
        run: |
          mkdir -p magisk_module/system/vendor/lib64/soundfx
          cp app/src/main/cpp/build_effect_only/libomega_effect.so \
             magisk_module/system/vendor/lib64/soundfx/libomega_effect.so
          chmod 644 magisk_module/system/vendor/lib64/soundfx/libomega_effect.so
          cd magisk_module
          zip -r ../ivanna-fusion-magisk-module.zip . \
            -x "daemon_src/build/*" "test_client*" "test_cmd*" "test_set*"

      - name: Upload Magisk module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-fusion-magisk-module
          path: ivanna-fusion-magisk-module.zip
          if-no-files-found: error
          retention-days: 14

  zero-failure-gate:
    runs-on: ubuntu-latest
    needs: [build-android-apk]
    steps:
      - run: echo "✅ APK real (única base activa) compiló correctamente."
