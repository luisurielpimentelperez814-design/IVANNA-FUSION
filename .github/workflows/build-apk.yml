name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Grant permission
        run: chmod +x gradlew

      - name: Create debug keystore (si no existe ya)
        run: |
          if [ -f "${{ github.workspace }}/debug.keystore" ]; then
            echo "debug.keystore ya existe en el repo (versionado), no se regenera."
          else
            keytool -genkey -v \
              -keystore "${{ github.workspace }}/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
          fi

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IVANNA-FUSION-APK
          path: app/build/outputs/apk/debug/app-debug.apk
