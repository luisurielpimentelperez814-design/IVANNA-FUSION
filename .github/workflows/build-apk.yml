name: Build APK Universal (público)
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmake;3.22.1" "ndk;25.2.9519653"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Grant permission
        run: chmod +x gradlew

      - name: Create debug keystore (si no existe ya)
        run: |
          if [ -f "${{ github.workspace }}/debug.keystore" ]; then
            echo "debug.keystore ya existe en el repo (versionado), no se regenera."
          else
            keytool -genkey -v \
              -keystore "${{ github.workspace }}/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
          fi

      - name: Clean Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          ./gradlew clean || true

      - name: Build APK (universal, todas las ABIs)
        run: ./gradlew assembleUniversalDebug --stacktrace --no-daemon --refresh-dependencies

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IVANNA-FUSION-Universal-APK
          path: app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error
          retention-days: 30
